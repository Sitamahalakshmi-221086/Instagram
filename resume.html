<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Digital Resume</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">
<a class="navbar-brand">MyResume</a>
<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav"></button>

<div class="collapse navbar-collapse" id="nav">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link">Home</a></li>
<li class="nav-item"><a class="nav-link">About</a></li>
<li class="nav-item"><a class="nav-link">Contact</a></li>
</ul>
</div>
</div>
</nav>

<!-- Hero -->
<div class="container text-center mt-5">
<h1>Welcome</h1>
<p>My Digital Resume</p>
<button class="btn btn-primary" id="btn">Click Me</button>
</div>

<!-- Grid -->
<div class="container mt-5">
<div class="row">
<div class="col-12 col-md-6 col-lg-4">
<div class="card p-3">Project 1</div>
</div>
<div class="col-12 col-md-6 col-lg-4">
<div class="card p-3">Project 2</div>
</div>
<div class="col-12 col-md-6 col-lg-4">
<div class="card p-3">Project 3</div>
</div>
</div>
</div>

<!-- Form -->
<div class="container mt-5">
<input type="text" class="form-control mb-2" placeholder="Name">
<input type="email" class="form-control mb-2" placeholder="Email">
<button class="btn btn-success">Submit</button>
</div>

<!-- Modal -->
<div class="modal fade" id="modal">
<div class="modal-dialog">
<div class="modal-content p-3">
<h4>Hello</h4>
<button class="btn btn-danger" data-bs-dismiss="modal">Close</button>
</div>
</div>
</div>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
$("#btn").click(function(){
    $("#modal").modal('show');
});
</script>

</body>
</html>
